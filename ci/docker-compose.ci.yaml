# CI/CD compose – isolated ephemeral environment for automated tests.
# Project name: sf_ci  (set in run_tests.sh via -p flag)
#
# Spins up a throwaway Postgres (tmpfs) and Odoo instance that installs
# modules with --test-enable, then tears everything down.
# Runtime credentials come from shell-exported values loaded by ci/run_tests.sh.

services:
  ci-db:
    image: postgres:18
    user: root
    environment:
      POSTGRES_USER: ${CI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CI_POSTGRES_DB}
    # tmpfs for speed – data is discarded after the run
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CI_POSTGRES_USER}"]
      interval: 3s
      timeout: 5s
      retries: 10

  ci-odoo:
    image: odoo:19
    user: root
    depends_on:
      ci-db:
        condition: service_healthy
    environment:
      HOST: ${CI_ODOO_DB_HOST}
      PORT: ${CI_ODOO_DB_PORT}
      USER: ${CI_POSTGRES_USER}
      PASSWORD: ${CI_POSTGRES_PASSWORD}
    volumes:
      - ../:/mnt/extra-addons:ro
      - ./odoo-ci.generated.runtime.conf:/etc/odoo/odoo.conf:ro
    # No HTTP – headless test runner; stop after init + test
    command: ["--no-http", "--stop-after-init", "--test-enable"]
